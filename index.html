<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #161b22;
    --border:    #30363d;
    --accent:    #58a6ff;
    --accent2:   #3fb950;
    --text:      #e6edf3;
    --muted:     #7d8590;
    --ln-color:  #484f58;
    --ln-cur:    #8b949e;
    --CODE:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --UI:        'Inter', system-ui, sans-serif;
    --LH:        21px;   /* line-height dùng px để dễ tính */
    --PAD:       14px;   /* padding top/bottom editor */
  }

  html, body {
    height: 100%;
    background: var(--bg); color: var(--text); font-family: var(--UI);
    overflow: hidden;
    overscroll-behavior: none;
    position: fixed;   /* khoá cứng, không cho trang web tự cuộn/giật khi vuốt */
    inset: 0;
    touch-action: none; /* chặn cử chỉ mặc định của trình duyệt ở mức trang */
  }

  /* ── App shell ── */
  .app {
    display: flex; flex-direction: column;
    height: 100vh;
    height: 100dvh; /* dvh (dynamic viewport height: chiều cao viewport động) tránh lỗi co giãn khi thanh địa chỉ ẩn/hiện trên mobile */
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 46px;
    background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .logo { font-family: var(--CODE); font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing:.04em; }
  .logo span { color: var(--accent2); }
  .meta { font-size: 11px; color: var(--muted); font-family: var(--CODE); }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Tab bar ── */
  .tab-bar {
    display: flex; align-items: stretch;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 0 16px; flex-shrink: 0;
  }
  .tab {
    display: flex; align-items: center; gap: 7px;
    padding: 0 18px; height: 40px;
    font-size: 12.5px; font-weight: 500; color: var(--muted);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s; user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab svg { width:14px; height:14px; opacity:.6; }
  .tab.active svg { opacity:1; }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); }

  /* ── Panels ── */
  .panel { flex:1; display:none; overflow:hidden; }
  .panel.active { display:flex; }

  /* ── Code panel ── */
  #panel-code { flex-direction: row; }

  /*
   * KEY FIX:
   * Cả line-numbers và textarea đều KHÔNG scroll riêng.
   * Chỉ có .editor-scroll là container scroll duy nhất.
   * Line numbers nằm bên trái, textarea nằm bên phải, cùng row.
   */
  .editor-scroll {
    flex: 1;
    overflow: auto;
    display: flex;         /* row: [gutter | textarea] */
    align-items: flex-start;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y;
  }

  /* scrollbar style */
  .editor-scroll::-webkit-scrollbar { width:8px; height:8px; }
  .editor-scroll::-webkit-scrollbar-track { background:transparent; }
  .editor-scroll::-webkit-scrollbar-thumb { background:#30363d; border-radius:4px; }
  .editor-scroll::-webkit-scrollbar-thumb:hover { background:#484f58; }

  /* Gutter (line numbers) — sticky so it stays visible while scrolling horizontally */
  .gutter {
    position: sticky;
    left: 0;
    z-index: 1;
    flex-shrink: 0;
    min-width: 52px;
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: var(--PAD) 0;
    user-select: none;
    touch-action: pan-y;
  }

  .gutter-inner {
    display: flex; flex-direction: column; align-items: flex-end;
    padding: 0 10px;
  }

  .ln {
    font-family: var(--CODE);
    font-size: 13px;
    line-height: var(--LH);
    height: var(--LH);
    color: var(--ln-color);
    white-space: nowrap;
  }
  .ln.cur { color: var(--ln-cur); font-weight: 600; }

  /* Wrapper giúp textarea mở rộng tự do theo cả 2 chiều */
  .code-sizer {
    display: inline-block; /* co giãn theo nội dung, không bị flex ép */
    min-width: 100%;       /* ít nhất bằng viewport */
    padding: var(--PAD) 20px var(--PAD) 0;
  }

  /* Textarea — expands to fit content, no own scroll */
  #code {
    display: block;
    width: 100%;
    padding: 0 20px;
    background: transparent;
    border: none; outline: none; resize: none;
    font-family: var(--CODE); font-size: 13px;
    line-height: var(--LH);
    color: var(--text);
    tab-size: 2;
    caret-color: var(--accent);
    white-space: pre;   /* no wrap */
    overflow: hidden;   /* let .editor-scroll handle scroll */
    touch-action: pan-x pan-y;
    /* width & height set by JS */
  }
  #code::selection { background: rgba(88,166,255,.22); }
  #code::placeholder { color: var(--muted); opacity: .7; }

  /* ── Status bar ── */
  .statusbar {
    height: 24px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 20px; flex-shrink: 0;
  }
  .si { font-family: var(--CODE); font-size: 11px; color: var(--muted); display:flex; align-items:center; gap:4px; }
  .si b { color: var(--text); font-weight:500; }

  /* ── Render panel ── */
  #panel-render { background: #fff; }
  #preview { width:100%; height:100%; border:none; display:block; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">&lt;<span>/</span>&gt; html editor</div>
    <div class="meta">live preview · auto-render</div>
  </header>

  <div class="main">
    <div class="tab-bar">
      <div class="tab active" data-tab="code" onclick="switchTab('code')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <polyline points="5,3 1,8 5,13"/><polyline points="11,3 15,8 11,13"/>
        </svg>
        Code <span class="dot"></span>
      </div>
      <div class="tab" data-tab="render" onclick="switchTab('render')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="1" y="2" width="14" height="11" rx="2"/>
          <line x1="1" y1="6" x2="15" y2="6"/>
          <circle cx="3.5" cy="4" r=".8" fill="currentColor" stroke="none"/>
          <circle cx="6"   cy="4" r=".8" fill="currentColor" stroke="none"/>
        </svg>
        Render
      </div>
    </div>

    <div class="panel active" id="panel-code">
      <div class="editor-scroll" id="edScroll">
        <div class="gutter"><div class="gutter-inner" id="gutter"></div></div>
        <div class="code-sizer" id="codeSizer">
          <textarea id="code" spellcheck="false" autocomplete="off"
            autocorrect="off" autocapitalize="off"
            placeholder="Dán hoặc gõ code HTML của bạn vào đây..."></textarea>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-render">
      <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-modals allow-forms"></iframe>
    </div>
  </div>

  <div class="statusbar">
    <div class="si">Dòng <b id="sLine">1</b> : Cột <b id="sCol">1</b></div>
    <div class="si">Tổng <b id="sTotal">1</b> dòng</div>
    <div class="si">Ký tự <b id="sChars">0</b></div>
    <div class="si">HTML</div>
  </div>
</div>

<script>
const ta       = document.getElementById('code');
const gutterEl = document.getElementById('gutter');
const sizerEl  = document.getElementById('codeSizer');
const preview  = document.getElementById('preview');

/* measure one character width once (monospace) */
let CH = 7.8; // fallback
(function() {
  const s = document.createElement('span');
  s.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font:13px/1 "JetBrains Mono","Fira Code",monospace';
  s.textContent = 'x'.repeat(100);
  document.body.appendChild(s);
  CH = s.offsetWidth / 100;
  document.body.removeChild(s);
})();

const LH  = 21;   // must match --LH
const PAD = 14;   // must match --PAD

let curTab = 'code';
let renderTimer = null;

/* Ô nhập liệu bắt đầu trống — chỉ hiện nhãn (placeholder) hướng dẫn,
   không còn code mẫu (sample code) nữa */
ta.value = '';
refresh();
renderPreview();

/* ── Tab switch ── */
function switchTab(name) {
  curTab = name;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p =>
    p.classList.toggle('active', p.id === 'panel-' + name));
  if (name === 'render') renderPreview();
}

/* ── Render ── */
function renderPreview() {
  preview.srcdoc = ta.value;
}

/* ── Main refresh: line numbers + height ── */
function refresh() {
  const lines    = ta.value.split('\n');
  const count    = lines.length;
  const curLine  = ta.value.substring(0, ta.selectionStart).split('\n').length;

  /* update gutter */
  // grow
  while (gutterEl.children.length < count) {
    const d = document.createElement('div');
    d.className = 'ln';
    gutterEl.appendChild(d);
  }
  // shrink
  while (gutterEl.children.length > count) {
    gutterEl.removeChild(gutterEl.lastChild);
  }
  // update numbers & highlight
  for (let i = 0; i < count; i++) {
    gutterEl.children[i].textContent = i + 1;
    gutterEl.children[i].classList.toggle('cur', i + 1 === curLine);
  }

  /* set textarea height so it never needs its own scrollbar */
  ta.style.height = (count * LH + PAD * 2) + 'px';

  /* set textarea + sizer width so horizontal scroll works */
  const maxLen = lines.reduce((m, l) => Math.max(m, l.length), 0);
  const minW   = Math.max(maxLen * CH + 60, 400); // 60px right padding
  ta.style.width    = minW + 'px';
  sizerEl.style.width = minW + 'px';

  /* status bar */
  const before = ta.value.substring(0, ta.selectionStart);
  const line   = before.split('\n').length;
  const col    = before.split('\n').pop().length + 1;
  document.getElementById('sLine').textContent  = line;
  document.getElementById('sCol').textContent   = col;
  document.getElementById('sTotal').textContent = count;
  document.getElementById('sChars').textContent = ta.value.length;
}

/* ── Events ── */
ta.addEventListener('input', () => {
  refresh();
  if (curTab === 'render') {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderPreview, 300);
  }
});

ta.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = s + 2;
    refresh();
  }
});

ta.addEventListener('click',  refresh);
ta.addEventListener('keyup',  refresh);
</script>
</body>
</html>
